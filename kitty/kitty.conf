# ------------------------------------------------------------
# Window behavior
# ------------------------------------------------------------

window_padding_width 8
background_opacity 0.90
disable_ligatures never
window_title Alacritty@CachyOS
confirm_os_window_close 0

# Kitty cannot use dynamic padding the same way, but this is close.

# ------------------------------------------------------------
# Font
# ------------------------------------------------------------

font_family monospace
bold_font monospace Bold
italic_font monospace Italic
bold_italic_font monospace Bold Italic

font_size 12.0

# ------------------------------------------------------------
# Cursor
# ------------------------------------------------------------

cursor_shape underline
cursor_underline_thickness 1.5
cursor_blink_interval 0
cursor_stop_blinking_after 0

# ------------------------------------------------------------
# Colors (direct Alacritty match)
# ------------------------------------------------------------

background #0F1117
foreground #D8DEE9

# Normal
color0  #1A1D26
color1  #FF4D6D
color2  #00BEBE
color3  #FFB7C5
color4  #2A375A
color5  #BD2C4B
color6  #00BEBE
color7  #E5E9F0

# Bright
color8  #4C566A
color9  #FF4D6D
color10 #00BEBE
color11 #FFB7C5
color12 #4C66A8
color13 #BD2C4B
color14 #00BEBE
color15 #ECEFF4

# Bold uses bright colors
draw_bold_text_with_bright_colors yes

# ------------------------------------------------------------
# Scrolling
# ------------------------------------------------------------

scrollback_lines 10000
wheel_scroll_multiplier 3

# ------------------------------------------------------------
# Selection
# ------------------------------------------------------------

copy_on_select yes
strip_trailing_spaces never

# ------------------------------------------------------------
# Keybinds (closest Kitty equivalents)
# ------------------------------------------------------------

map ctrl+shift+v paste_from_clipboard
map ctrl+shift+c copy_to_clipboard

map ctrl+shift+f search
map ctrl+shift+l clear_terminal

map shift+page_up scroll_page_up
map shift+page_down scroll_page_down
map shift+home scroll_home
map shift+end scroll_end

# ------------------------------------------------------------
# Mouse
# ------------------------------------------------------------

hide_mouse_when_typing yes
paste_from_selection_on_middle_click yes

# ------------------------------------------------------------
# Misc
# ------------------------------------------------------------

shell_integration disabled
